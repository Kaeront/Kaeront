<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль игрока — Kaeront</title>
    <style>
        .user-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .user-card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .registered-badge {
            font-family: 'Minecraft', sans-serif;
            color: var(--accent);
            font-size: 0.75rem;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .user-avatar-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 128px;
            height: 128px;
            border-radius: 8px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #222;
            background: #000;
        }

        .user-name {
            font-family: 'Minecraft', sans-serif;
            font-size: 1.8rem;
            color: var(--text-main);
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .user-uuid {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            user-select: all;
            background: #050505;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #111;
        }

        .status-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        .status-dot.online {
            background: #55ff55;
            box-shadow: 0 0 8px rgba(85, 255, 85, 0.5);
        }

        .status-dot.offline {
            background: #ff5555;
        }

        .namemc-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #121212;
            border: 1px solid #282828;
            color: var(--text-main);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .namemc-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .error-card {
            color: #ff4444;
            font-family: 'Minecraft', sans-serif;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loader-wrapper" style="position: fixed; user-select: none; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease, visibility 0.5s; animation: hideLoaderNoJS 0.5s forwards;">
    <div style="position: relative; text-align: center; width: 100%;">
        <!-- Основной текст (исчезает через 5 секунд) -->
        <div style="font-family: sans-serif; color: #888; font-size: clamp(3vh, 3vw, 3vw); animation: fadeOutText 0.3s forwards; animation-delay: 5s;">
            <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> загружается...
        </div>
        <!-- Текст ошибки -->
        <div style="position: absolute; top: 0; left: 0; right: 0; font-family: sans-serif; color: #888; font-size: clamp(3vh, 3vw, 3vw); opacity: 0; animation: fadeInText 0.3s forwards; animation-delay: 5s; line-height: 0.3;">
            «Что-то вы долго!»<span style="font-size: clamp(1vh, 1vw, 1vw);"><br><br>Попробуйте обновить страницу.<br>Загрузка <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> всё ещё идёт.</span>
        </div>
    </div>
</div>

<script>
    // Мгновенная блокировка авто-скрытия, если JS разрешен
    (function() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            // Удаляем анимацию hideLoaderNoJS, чтобы лоадер не исчез сам по себе
            loader.style.animation = 'none';
        }
    })();
</script>

<style>
    /* Блокировка скролла по умолчанию */
    body { overflow: hidden; }
    /* Анимация для случая, когда JavaScript отключен */
    @keyframes hideLoaderNoJS { to { opacity: 0; visibility: hidden; } }
    @keyframes fadeOutText { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
    @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }
</style>
<noscript>
<div style=" position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; color: white; user-select: none; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: sans-serif; box-sizing: border-box; overflow: hidden;">
    <h2 style="max-width: 80vw; font-family: sans-serif; color: #FA0; font-size: clamp(3vh, 3vw, 3vw); font-weight: 600;">Включите JavaScript</h2>
    <p style="max-width: 80vw; font-size: clamp(1.5vh, 1.2vw, 1.2vw); line-height: 1.6; color: #888; ">Для корректной работы сайта kaeront.ru, стабильного отображения контента, анимаций и переходов необходимо включить поддержку JavaScript на вашем браузере. Без него большинство функций будет недоступно. Данное предупреждение скрыть невозможно, из-за не работы скриптов, как раз таки.<br>¯\_(ツ)_/¯</p>
</div>

<style>
    body { overflow: hidden !important; }
</style>
</noscript>

    <div id="dev-inject"></div>
    <div id="nav-inject"></div>

    <main class="user-container">
        <div class="user-card" id="user-card">
            <div style="color: var(--text-dim); font-size: 0.8rem;">Загрузка профиля...</div>
        </div>
    </main>

    <div id="footer-inject"></div>

    <script src="/assets/global.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadUserProfile();
        });

        async function loadUserProfile() {
            const card = document.getElementById('user-card');
            
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const queryTarget = pathParts[pathParts.length - 1];

            if (!queryTarget || queryTarget === 'user') {
                card.innerHTML = `<div class="error-card">Пользователь не указан</div>`;
                return;
            }

            try {
                // 1. Запрос к PlayerDB
                const playerRes = await fetch(`https://playerdb.co/api/player/minecraft/${encodeURIComponent(queryTarget)}`);
                if (!playerRes.ok) {
                    throw new Error("Игрок не найден в базе.");
                }
                const playerData = await playerRes.json();

                if (!playerData.success || !playerData.data || !playerData.data.player) {
                    throw new Error("Игрок с таким ником или UUID не найден.");
                }

                const player = playerData.data.player;
                const username = player.username;
                const uuid = player.id;
                const rawId = player.raw_id;
                const avatarUrl = `https://crafthead.net/avatar/${rawId}/128`;
                const nameMcUrl = `https://namemc.com/profile/${uuid}`;

                let registeredText = '';
                let siteOnline = false;
                let serverOnline = false;

                // 2. Данные из базы Kaeront (через наш Vercel Proxy / VDS)
                try {
                    const dbRes = await fetch(`/api/users/${uuid}`);
                    if (dbRes.ok) {
                        const dbData = await dbRes.json();
                        if (dbData) {
                            if (dbData.registered_at) {
                                // Парсим UTC дату и форматируем в локальный часовой пояс клиента
                                const regDate = new Date(dbData.registered_at.includes('Z') ? dbData.registered_at : dbData.registered_at + 'Z'); 
                                const formattedDate = regDate.toLocaleString(undefined, {
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit'
                                });
                                registeredText = `<div class="registered-badge">Зарегистрирован на Kaeront с: ${formattedDate}</div>`;
                            }
                            siteOnline = dbData.site_online ?? false;
                            serverOnline = dbData.server_online ?? false;
                        }
                    }
                } catch (e) {
                    console.error("Не удалось забрать данные Kaeront API", e);
                }

                card.innerHTML = `
                    ${registeredText}
                    <div class="user-avatar-wrapper">
                        <img src="${avatarUrl}" alt="${username}" class="user-avatar">
                    </div>
                    <h1 class="user-name">${username}</h1>
                    <div class="user-uuid">${uuid}</div>
                    <div class="status-container">
                        <div class="status-badge">
                            <span class="status-dot ${siteOnline ? 'online' : 'offline'}"></span>
                            На сайте: <b>${siteOnline ? 'Онлайн' : 'Оффлайн'}</b>
                        </div>
                        <div class="status-badge">
                            <span class="status-dot ${serverOnline ? 'online' : 'offline'}"></span>
                            На сервере: <b>${serverOnline ? 'Онлайн' : 'Оффлайн'}</b>
                        </div>
                    </div>
                    <a href="${nameMcUrl}" target="_blank" rel="noopener noreferrer" class="namemc-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        Посмотреть на NameMC
                    </a>
                `;

            } catch (err) {
                card.innerHTML = `<div class="error-card">${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
