<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/assets/palm.png">
    <title>Kaeront | Архив</title>
    <!-- Подключаем парсер Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Твой новый скрипт для Вики -->
    <script src="./assets/archive-global.js" defer></script>
    <script src="./assets/global.js" defer></script>
    
    <style>
        :root {
            --sidebar-width: 200px;
        }

        /* Общий контейнер для сайдбара и контента */
        .wiki-layout {
            display: flex;
            margin-top: var(--nav-height); /* Отступ под глобальный навбар */
            min-height: calc(100vh - var(--nav-height));
            position: relative;
        }

        /* --- САЙДБАР --- */
        .wiki-sidebar {
            max-width: var(--sidebar-width);
            width: 100%;
            background: rgb(15, 15, 15);
            border-right: 1.5px solid #1a1a1a;
            padding: 15px;
            box-sizing: border-box;
            position: sticky;
            top: var(--nav-height);
            height: calc(100vh - var(--nav-height));
            overflow-y: auto;
            z-index: 10;
        }

        /* Выпадающий список */
        .sidebar-category {
            margin-bottom: 15px;
        }

        .category-title {
            font-family: 'Minecraft', sans-serif;
            font-size: 0.7rem;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(255, 170, 0, 0.05);
            border-left: 2px solid var(--accent);
            user-select: none;
            transition: background 0.2s;
        }

        .category-title:hover {
            background: rgba(255, 170, 0, 0.1);
        }

        .category-title::after {
            content: '▼';
            font-size: 0.5rem;
            transition: transform 0.3s;
        }

        .sidebar-category.active .category-title::after {
            transform: rotate(-180deg);
        }

        /* Список статей внутри категории */
        .category-links {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.2s ease,
                        padding 0.3s ease;
            opacity: 0;
            padding-left: 10px;
            padding-top: 0;
            padding-bottom: 0;
        }

        /* Контейнер-обёртка, необходимый для работы плавного Grid */
        .category-links-wrapper {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px; /* Небольшой зазор между ссылками */
        }

        .sidebar-category.active .category-links {
            grid-template-rows: 1fr;
            opacity: 1;
            padding-top: 8px; 
            padding-bottom: 4px;
        }

        .category-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.7rem;
            padding: 6px 10px;
            border-radius: 4px;
            transition: color 0.2s ease, background 0.2s ease, padding-left 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .category-links a:hover,
        .category-links a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            padding-left: 16px;
        }


        /* --- КОНТЕНТНАЯ ОБЛАСТЬ --- */
        #wiki-app {
            flex-grow: 1;
            padding: 40px;
            max-width: 900px;
            box-sizing: border-box;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center top;
            opacity: 1;
            transform: scale(1);
        }

        #wiki-app.scale-down {
            opacity: 0.05;
            transform: scale(0.9);
        }

        /* Рендеринг разметки статьи */
        .markdown-body {
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .markdown-body h1 { font-family: 'Minecraft', sans-serif; color: var(--accent); margin-top: 0; margin-bottom: 25px; font-size: 1.8rem; }
        .markdown-body h2 { font-family: 'Minecraft', sans-serif; color: #fff; margin-top: 35px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; font-size: 1.3rem; }
        .markdown-body h3 { font-family: 'Minecraft', sans-serif; color: #fff; margin-top: 25px; font-size: 1rem; }
        .markdown-body p { color: var(--text-dim); text-align: justify; margin-bottom: 20px; }
        .markdown-body a { color: var(--accent); text-decoration: none; transition: 0.3s; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body code { background: #141414; padding: 3px 6px; border-radius: 3px; font-family: monospace; font-size: 0.85rem; color: var(--accent); }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .wiki-layout {
                flex-direction: column;
            }
            .wiki-sidebar {
                max-width: 100vw !important;
                height: auto;
                position: relative;
                top: 0;
                border-right: none;
                border-bottom: 1.5px solid #1a1a1a;
                padding: 10px;
            }
            #wiki-app {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loader-wrapper" style="
    position: fixed;
    user-select: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.5s ease, visibility 0.5s;
    animation: hideLoaderNoJS 0.5s forwards;
">
    <div style="position: relative; text-align: center; width: 100%;">

        <!-- Основной текст (исчезает через 5 секунд) -->
        <div style="
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            animation: fadeOutText 0.3s forwards;
            animation-delay: 5s;
        ">
            <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> загружается...
        </div>

        <!-- Текст ошибки -->
        <div style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            opacity: 0;
            animation: fadeInText 0.3s forwards;
            animation-delay: 5s;
            line-height: 0.3;
        ">
            «Что-то вы долго!»<span style="font-size: clamp(1vh, 1vw, 1vw);"><br><br>Попробуйте обновить страницу.<br>Загрузка <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> всё ещё идёт.</span>
        </div>

    </div>
</div>

<script>
    // Мгновенная блокировка авто-скрытия, если JS разрешен
    (function() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            // Удаляем анимацию hideLoaderNoJS, чтобы лоадер не исчез сам по себе
            loader.style.animation = 'none';
        }
    })();
</script>

<style>
    /* Блокировка скролла по умолчанию */
    body { 
        overflow: hidden;
    }

    /* Анимация для случая, когда JavaScript отключен */
    @keyframes hideLoaderNoJS {
        to { 
            opacity: 0; 
            visibility: hidden; 
        }
    }

    @keyframes fadeOutText {
        from { opacity: 1; }
        to { opacity: 0; visibility: hidden; }
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

      <noscript>
        <div style="
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #0a0a0a; 
            color: white; 
            user-select: none;
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            font-family: sans-serif;
            box-sizing: border-box;
            overflow: hidden;
        ">
            <h2 style="max-width: 80vw; font-family: sans-serif; color: #FA0; font-size: clamp(3vh, 3vw, 3vw); font-weight: 600;">Включите JavaScript</h2>

            <p style="max-width: 80vw; font-size: clamp(1.5vh, 1.2vw, 1.2vw); line-height: 1.6; color: #888; ">
                Для корректной работы сайта kaeront.ru, стабильного отображения контента, анимаций и переходов необходимо включить поддержку JavaScript на вашем браузере. Без него большинство функций будет недоступно. Данное предупреждение скрыть невозможно, из-за не работы скриптов, как раз таки.<br>¯\_(ツ)_/¯
            </p>
        </div>

        <style>
            body { overflow: hidden !important; }
        </style>
      </noscript>

    <div id="nav-inject"></div>

    <div class="wiki-layout">
        <aside class="wiki-sidebar">
            
            <!-- Категория 1 -->
            <div class="sidebar-category active">
                <div class="category-title" onclick="toggleCategory(this)">О Проекте</div>
                <div class="category-links">
                    <div class="category-links-wrapper">
                        <a href="/archive/index" class="active">Главная архива</a>
                        <a href="/archive/rules">Правила проекта</a>
                    </div>
                </div>
            </div>

            <!-- Категория 2 -->
            <div class="sidebar-category">
                <div class="category-title" onclick="toggleCategory(this)">Игровые Миры</div>
                <div class="category-links">
                    <div class="category-links-wrapper">
                        <a href="/archive/legends">Legends</a>
                        <a href="/archive/fyghting">FYGHTING</a>
                    </div>
                </div>
            </div>

        </aside>


        <!-- Основной контент -->
        <main id="wiki-app">
            <article id="wiki-content" class="markdown-body">

            </article>
        </main>
    </div>

    <!-- Сюда встроится глобальный футер -->
    <div id="footer-inject"></div>

    <script>
        // Функция раскрытия/закрытия папок в Сайдбаре
        function toggleCategory(element) {
            const parent = element.parentElement;
            parent.classList.toggle('active');
        }
    </script>
</body>
</html>
