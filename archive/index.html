<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/assets/palm.png">
    <title>Kaeront | Архив</title>
    <!-- Подключаем парсер Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Твой новый скрипт для Вики -->
    <script src="./assets/archive-global.js" defer></script>
    <script src="./assets/global.js" defer></script>

    <style>
                :root {
            --nav-hide: -1px;
            --sidebar-width: 260px; /* Оптимальная ширина для глубокой вложенности */
        }

        /* Общий контейнер-лейаут */
        .wiki-layout {
            display: flex;
            margin-top: var(--nav-height); /* Отступ под глобальный навбар */
            min-height: calc(100vh - var(--nav-height));
            position: relative;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- САЙДБАР --- */
        .wiki-sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width); /* Не даем флексам сжимать сайдбар */
            background: rgb(15, 15, 15);
            border-right: 1.5px solid #1a1a1a;
            padding: 15px;
            box-sizing: border-box;
            position: sticky;
            top: var(--nav-height);
            height: calc(100vh - var(--nav-height));
            overflow-y: auto;
            z-index: 99; /* Ниже основного навбара (2000), но выше контента */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- ПОИСК СТАТЕЙ --- */
        .sidebar-search-wrapper {
            position: relative;
            width: 100%;
        }

        .sidebar-search {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 4px;
            padding: 8px 12px;
            box-sizing: border-box;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .sidebar-search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(255, 170, 0, 0.15);
        }

        .sidebar-search::placeholder {
            color: #444;
        }

        /* --- УНИВЕРСАЛЬНАЯ СТРУКТУРА ДЕРЕВА --- */
        .wiki-tree {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Элемент папки (контейнер) */
        .wiki-folder {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* Заголовок папки */
        .folder-title {
            font-family: 'Minecraft', sans-serif;
            font-size: 0.65rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid transparent;
            user-select: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            border-radius: 0 4px 4px 0;
        }

        .folder-title:hover {
            background: rgba(255, 170, 0, 0.05);
            color: var(--accent);
        }

        /* Иконка раскрытия */
        .folder-title::after {
            content: '▶';
            font-size: 0.45rem;
            transition: transform 0.2s ease;
            color: #444;
        }

        /* Активное/открытое состояние папки */
        .wiki-folder.open > .folder-title {
            color: var(--accent);
            background: rgba(255, 170, 0, 0.03);
            border-left-color: var(--accent);
        }

        .wiki-folder.open > .folder-title::after {
            transform: rotate(90deg);
            color: var(--accent);
        }

        /* Контейнер для вложенного содержимого папки */
        .folder-content {
            display: grid;
            grid-template-rows: 0fr;
            opacity: 0;
            visibility: hidden;
            transition: grid-template-rows 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.2s ease,
                        visibility 0.2s ease;
            padding-left: 8px;
        }

        .wiki-folder.open > .folder-content {
            grid-template-rows: 1fr;
            opacity: 1;
            visibility: visible;
            margin-top: 2px;
            margin-bottom: 2px;
        }

        /* Обёртка контента папки */
        .folder-content-wrapper {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-left: 1px dashed #1a1a1a;
            padding-left: 6px;
        }

        /* Конечные ссылки на статьи */
        .wiki-tree a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.65rem;
            padding: 5px 8px;
            border-radius: 4px;
            transition: color 0.2s ease, background 0.2s ease, padding-left 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            display: block;
        }

        .wiki-tree a:hover,
        .wiki-tree a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.04);
            padding-left: 12px;
        }

        /* Подсветка найденного слова при поиске */
        .search-match {
            color: var(--accent) !important;
            font-weight: 600;
        }

        /* Скрытие элементов, не подошедших под поиск */
        .wiki-folder.search-hidden,
        .wiki-tree a.search-hidden {
            display: none !important;
        }

        /* --- КОНТЕНТНАЯ ОБЛАСТЬ --- */
        #wiki-app {
            flex-grow: 1;
            padding: 40px;
            max-width: calc(100% - var(--sidebar-width)); /* Ограничиваем область, чтобы она не уползала под сайдбар */
            box-sizing: border-box;
            transition: transform 0.35s cubic-bezier(0.215, 0.61, 0.355, 1), 
                        opacity 0.35s cubic-bezier(0.215, 0.61, 0.355, 1);
            transform-origin: top center;
            opacity: 1;
            transform: scale(1);
        }

        /* Анимация отдаления */
        #wiki-app.scale-down {
            opacity: 0.1;
            transform: scale(0.95);
            transition: transform 0.15s ease-in, 
                        opacity 0.15s ease-in;
        }

        /* Рендеринг разметки статьи */
        .markdown-body {
            line-height: 1.7;
            font-size: 0.95rem;
            max-width: 800px; /* Делаем текст легко читаемым */
        }
        .markdown-body h1 { font-family: 'Minecraft', sans-serif; color: var(--accent); margin-top: 0; margin-bottom: 25px; font-size: 1.8rem; }
        .markdown-body h2 { font-family: 'Minecraft', sans-serif; color: #fff; margin-top: 35px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; font-size: 1.3rem; }
        .markdown-body h3 { font-family: 'Minecraft', sans-serif; color: #fff; margin-top: 25px; font-size: 1rem; }
        .markdown-body p { color: var(--text-dim); text-align: justify; margin-bottom: 20px; }
        .markdown-body a { color: var(--accent); text-decoration: none; transition: 0.3s; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body code { background: #141414; padding: 3px 6px; border-radius: 3px; font-family: monospace; font-size: 0.85rem; color: var(--accent); }

        /* Адаптивность для мобильных */
        @media (max-width: 768px) {
            .wiki-layout {
                flex-direction: column;
                margin-top: var(--nav-height);
                min-height: auto;
            }
            .wiki-sidebar {
                width: 100%;
                max-width: 100% !important;
                min-width: 100% !important;
                height: auto;
                position: relative;
                top: 0;
                border-right: none;
                border-bottom: 1.5px solid #1a1a1a;
                padding: 15px;
            }
            #wiki-app {
                width: 100%;
                max-width: 100% !important;
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loader-wrapper" style="
    position: fixed;
    user-select: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.5s ease, visibility 0.5s;
    animation: hideLoaderNoJS 0.5s forwards;
">
    <div style="position: relative; text-align: center; width: 100%;">
        <div style="
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            animation: fadeOutText 0.3s forwards;
            animation-delay: 5s;
        ">
            <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> загружается...
        </div>
        <div style="
            position: absolute;
            top: 0; left: 0; right: 0;
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            opacity: 0;
            animation: fadeInText 0.3s forwards;
            animation-delay: 5s;
            line-height: 0.3;
        ">
            «Что-то вы долго!»<span style="font-size: clamp(1vh, 1vw, 1vw);"><br><br>Попробуйте обновить страницу.<br>Загрузка <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> всё ещё идёт.</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            loader.style.animation = 'none';
        }
    })();
</script>

<style>
    body { overflow: hidden; }
    @keyframes hideLoaderNoJS { to { opacity: 0; visibility: hidden; } }
    @keyframes fadeOutText { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
    @keyframes fadeInText { from { opacity: 0; } to { opacity: 1; } }
</style>

<noscript>
    <div style="
        position: fixed; 
        top: 0; left: 0; 
        width: 100vw; height: 100vh; 
        background: #0a0a0a; 
        color: white; 
        user-select: none;
        z-index: 9999; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        text-align: center; 
        font-family: sans-serif;
        box-sizing: border-box;
        overflow: hidden;
    ">
        <h2 style="max-width: 80vw; font-family: sans-serif; color: #FA0; font-size: clamp(3vh, 3vw, 3vw); font-weight: 600;">Включите JavaScript</h2>
        <p style="max-width: 80vw; font-size: clamp(1.5vh, 1.2vw, 1.2vw); line-height: 1.6; color: #888; ">
            Для корректной работы сайта kaeront.ru, стабильного отображения контента, анимаций и переходов необходимо включить поддержку JavaScript. Без него большинство функций будет недоступно.<br>¯\_(ツ)_/¯
        </p>
    </div>
    <style>body { overflow: hidden !important; }</style>
</noscript>

<div id="nav-inject"></div>

<div class="wiki-layout">
    <aside class="wiki-sidebar">
        <!-- Поиск по сайдбару -->
        <div class="sidebar-search-wrapper">
            <input type="text" id="wiki-search" class="sidebar-search" placeholder="Поиск по архиву..." autocomplete="off">
        </div>

        <!-- Дерево навигации -->
        <nav class="wiki-tree">

            <!-- Папка О Проекте -->
            <div class="wiki-folder open">
                <div class="folder-title" onclick="toggleFolder(this)">О Проекте</div>
                <div class="folder-content">
                    <div class="folder-content-wrapper">
                        <a href="/archive/index" class="active">Главная архива</a>
                        <a href="/archive/rules">Правила проекта</a>
                    </div>
                </div>
            </div>

            <!-- Большая папка "Игры" с глубокой вложенностью -->
            <div class="wiki-folder">
                <div class="folder-title" onclick="toggleFolder(this)">Игры</div>
                <div class="folder-content">
                    <div class="folder-content-wrapper">
                        
                        <!-- Вложенная папка "Legends" -->
                        <div class="wiki-folder">
                            <div class="folder-title" onclick="toggleFolder(this)">Legends</div>
                            <div class="folder-content">
                                <div class="folder-content-wrapper">
                                    <a href="/archive/legends">Главная Legends</a>
                                    <a href="/archive/legends/pixieas_archive">Архивы Пиксии</a>
                                    
                                    <!-- Вложенная папка "Персонажи" -->
                                    <div class="wiki-folder">
                                        <div class="folder-title" onclick="toggleFolder(this)">Персонажи</div>
                                        <div class="folder-content">
                                            <div class="folder-content-wrapper">
                                                
                                                <!-- Вложенная папка "Игровые" -->
                                                <div class="wiki-folder">
                                                    <div class="folder-title" onclick="toggleFolder(this)">Игровые</div>
                                                    <div class="folder-content">
                                                        <div class="folder-content-wrapper">
                                                            <a href="/archive/legends/characters/playable/shang">Шэнг</a>
                                                            <a href="/archive/legends/characters/playable/baochi">Баочи</a>
                                                        </div>
                                                    </div>
                                                </div>

                                                <!-- Вложенная папка "Враги" -->
                                                <div class="wiki-folder">
                                                    <div class="folder-title" onclick="toggleFolder(this)">Враги</div>
                                                    <div class="folder-content">
                                                        <div class="folder-content-wrapper">
                                                            <a href="/archive/legends/characters/enemies/slimes">Слаймы</a>
                                                            <a href="/archive/legends/characters/enemies/ifayenis">Ифайенисы</a>
                                                        </div>
                                                    </div>
                                                </div>

                                            </div>
                                        </div>
                                    </div> <!-- Конец Персонажи -->

                                </div>
                            </div>
                        </div> <!-- Конец Legends -->

                    </div>
                </div>
            </div> <!-- Конец Игры -->

        </nav>
    </aside>

    <!-- Основной контент -->
    <main id="wiki-app">
        <article id="wiki-content" class="markdown-body"></article>
    </main>
</div>

<div id="footer-inject"></div>

<script>
    // Простая функция переключения класса папок
    function toggleFolder(element) {
        // Предотвращаем запуск клика, если поиск сейчас активен (чтобы не сбивать состояние раскрытия)
        if (document.getElementById('wiki-search').value.trim() !== '') return;
        
        const folder = element.parentElement;
        folder.classList.toggle('open');
    }
</script>
</body>
</html>
