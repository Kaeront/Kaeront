<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Kaeront</title>
    
    <style>
        body {
            display: none; /* Скрыто до проверки сессии */
            background-color: #080808 !important;
            color: #ececec;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        .page-container {
            max-width: 1100px;
            margin: 120px auto 60px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* Сайдбар */
        .ks-sidebar {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .ks-sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #666;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .ks-nav-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ks-nav-item {
            display: block;
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            border: none;
            text-align: left;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .ks-nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .ks-nav-item.active {
            background: #222;
            color: #fff;
            font-weight: 600;
            border: 1px solid #333;
        }

        /* Основной блок контента */
        .ks-content {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .ks-tab-panel {
            display: none;
        }
        .ks-tab-panel.active {
            display: block;
        }

        .ks-header {
            margin-bottom: 24px;
            border-bottom: 1px solid #222;
            padding-bottom: 16px;
        }

        .ks-title {
            font-family: 'Minecraft', sans-serif, monospace;
            font-size: 1.4rem;
            color: #fff;
            margin: 0 0 6px 0;
        }

        .ks-subtitle {
            color: #777;
            font-size: 0.85rem;
            margin: 0;
        }

        /* Карточка пользователя */
        .ks-user-box {
            background: #111;
            border: 1px solid #252525;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .ks-user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ks-username {
            font-family: 'Minecraft', sans-serif, monospace;
            font-size: 1.2rem;
            color: #fff;
        }

        .ks-uuid {
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
        }

        /* Таблица истории */
        .ks-table-container {
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            background: #0f0f0f;
            margin-top: 16px;
        }

        .ks-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.85rem;
        }

        .ks-table th {
            background: #161616;
            color: #777;
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        .ks-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #1a1a1a;
            color: #ccc;
        }

        .ks-table tr:last-child td {
            border-bottom: none;
        }

        .ks-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: rgba(85, 255, 85, 0.1);
            color: #55ff55;
            border: 1px solid rgba(85, 255, 85, 0.2);
        }

        /* Кнопки */
        .ks-btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .ks-btn-sec {
            background: #1a1a1a;
            color: #ccc;
            border-color: #333;
        }
        .ks-btn-sec:hover {
            background: #252525;
            color: #fff;
        }

        .ks-btn-danger {
            background: rgba(255, 85, 85, 0.1);
            color: #ff5555;
            border-color: rgba(255, 85, 85, 0.3);
        }
        .ks-btn-danger:hover {
            background: #ff5555;
            color: #fff;
        }

        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .page-container {
                margin-top: 90px;
            }
        }
    </style>

    <script>
        (async function checkAuthGuard() {
            const token = localStorage.getItem('kaeront_access_token');
            if (!token) {
                window.location.replace('/login');
                return;
            }

            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join('')));

                const uuid = payload.sub;

                // Проверка сессии
                const res = await fetch(`/api/v1/users/${uuid}/status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ site_online: true })
                });

                if (res.ok) {
                    document.addEventListener('DOMContentLoaded', () => {
                        document.body.style.display = 'block';
                        initSettings(uuid, token);
                    });
                } else {
                    localStorage.removeItem('kaeront_access_token');
                    window.location.replace('/login');
                }
            } catch (err) {
                console.error("Auth Guard Error:", err);
                localStorage.removeItem('kaeront_access_token');
                window.location.replace('/login');
            }
        })();
    </script>
</head>
<body>
    <div id="nav-inject"></div>

    <div class="page-container">
        <div class="settings-grid">
            
            <!-- Левое меню -->
            <aside class="ks-sidebar">
                <div class="ks-sidebar-title">Настройки</div>
                <div class="ks-nav-list">
                    <button class="ks-nav-item active" onclick="switchTab('tab-general', this)">Основное</button>
                    <button class="ks-nav-item" onclick="switchTab('tab-security', this)">Безопасность</button>
                </div>
            </aside>

            <!-- Основной контент -->
            <main class="ks-content">
                
                <!-- Вкладка 1: Основное -->
                <div id="tab-general" class="ks-tab-panel active">
                    <div class="ks-header">
                        <h1 class="ks-title">Основное</h1>
                        <p class="ks-subtitle">Управление профилем и текущей сессией</p>
                    </div>

                    <div class="ks-user-box">
                        <div class="ks-user-info">
                            <span class="ks-username" id="display-username">Загрузка...</span>
                            <span class="ks-uuid" id="display-uuid">...</span>
                        </div>
                        <a id="profile-link" href="#" class="ks-btn ks-btn-sec">Профиль</a>
                    </div>

                    <button class="ks-btn ks-btn-sec" onclick="logoutSingle()">Выйти с этого устройства</button>
                </div>

                <!-- Вкладка 2: Безопасность -->
                <div id="tab-security" class="ks-tab-panel">
                    <div class="ks-header">
                        <h1 class="ks-title">Безопасность</h1>
                        <p class="ks-subtitle">Сессии и история авторизаций</p>
                    </div>

                    <div style="margin-bottom: 30px;">
                        <h3 style="margin: 0 0 8px 0; font-size: 1rem; color: #fff;">Активные сессии</h3>
                        <p style="margin: 0 0 14px 0; font-size: 0.85rem; color: #777;">
                            Завершить все открытые сеансы на всех устройствах.
                        </p>
                        <button class="ks-btn ks-btn-danger" onclick="logoutAll()">Завершить все сессии</button>
                    </div>

                    <div>
                        <h3 style="margin: 0 0 12px 0; font-size: 1rem; color: #fff;">История успешных входов</h3>
                        <div class="ks-table-container">
                            <table class="ks-table">
                                <thead>
                                    <tr>
                                        <th>Код авторизации</th>
                                        <th>Дата и время</th>
                                        <th>Статус</th>
                                    </tr>
                                </thead>
                                <tbody id="history-rows">
                                    <tr>
                                        <td colspan="3" style="text-align: center; color: #555;">Загрузка истории...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="/assets/global.js"></script>
    <script>
        function switchTab(tabId, btn) {
            document.querySelectorAll('.ks-tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ks-nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        async function initSettings(uuid, token) {
            document.getElementById('display-uuid').textContent = uuid;

            // Загрузка пользователя (с фоллбэком на PlayerDB)
            try {
                let username = null;
                const res = await fetch(`/api/v1/users/${uuid}`);
                if (res.ok) {
                    const data = await res.json();
                    username = data.username || data.name;
                }

                if (!username) {
                    const pdb = await fetch(`https://playerdb.co/api/player/minecraft/${uuid}`);
                    if (pdb.ok) {
                        const pdbData = await pdb.json();
                        username = pdbData.data.player.username;
                    }
                }

                const finalName = username || "Игрок";
                document.getElementById('display-username').textContent = finalName;
                document.getElementById('profile-link').href = `/user/${finalName}`;
            } catch (e) {
                console.error("User fetch error:", e);
                document.getElementById('display-username').textContent = "Игрок";
                document.getElementById('profile-link').href = `/user/${uuid}`;
            }

            // Загрузка истории входов
            try {
                const res = await fetch(`/api/v1/users/${uuid}/login-history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    const history = data.history || data;
                    renderHistory(Array.isArray(history) ? history : []);
                } else {
                    document.getElementById('history-rows').innerHTML = 
                        `<tr><td colspan="3" style="text-align: center; color: #666;">Записей истории пока нет</td></tr>`;
                }
            } catch (e) {
                console.error("History fetch error:", e);
                document.getElementById('history-rows').innerHTML = 
                    `<tr><td colspan="3" style="text-align: center; color: #ff5555;">Не удалось загрузить историю</td></tr>`;
            }
        }

        function renderHistory(items) {
            const tbody = document.getElementById('history-rows');
            if (!items.length) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Записей истории не найдено</td></tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => `
                <tr>
                    <td style="font-family: monospace; font-weight: 600; color: #fff;">${item.code || '—'}</td>
                    <td>${item.created_at ? new Date(item.created_at).toLocaleString('ru-RU') : '—'}</td>
                    <td><span class="ks-badge">${item.status || 'Успешно'}</span></td>
                </tr>
            `).join('');
        }

        function logoutSingle() {
            localStorage.removeItem('kaeront_access_token');
            window.location.replace('/login');
        }

        async function logoutAll() {
            const token = localStorage.getItem('kaeront_access_token');
            if (token) {
                try {
                    await fetch('/api/v1/user/logout-all', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (e) {}
            }
            localStorage.removeItem('kaeront_access_token');
            window.location.replace('/login');
        }
    </script>
</body>
</html>
