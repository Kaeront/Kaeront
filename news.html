<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="palm.png">
    <title>Kaeront | Новости</title>
    <script src="/news-data.js"></script>
    <script src="/global.js" defer></script>


    <style>
        :root {
            --nav-hide: 81px;
            --card-bg: rgba(20, 20, 20, 0.5);
        }

        .content-wrapper {
            padding-top: calc(var(--nav-height) + 40px);
            max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; flex-grow: 1;
        }

        /* Поиск и Фильтры */
        .controls { margin: 20px; display: flex; flex-direction: column; gap: 20px; }
        .search-input {
            background: #151515; border: 1px solid #333; color: white;
            padding: 12px; font-family: 'Montserrat'; outline: none; width: 100%; box-sizing: border-box;
            border-radius: 0;
        }
        .search-input:focus { border-color: var(--accent); }
        
        .filter-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-btn {
            background: #151515; border: 1px solid #333; color: var(--text-dim);
            padding: 8px; cursor: url('pointer.png'), pointer; font-family: 'Minecraft'; font-size: 0.6rem; transition: 0.2s;
        }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255, 170, 0, 0.1); }

        .header-section { margin: 20px; }
        h1 { font-family: 'Minecraft'; font-size: 1.5rem; color: var(--accent); margin-bottom: 30px; }

        .news-list { display: flex; flex-direction: column; gap: 30px; margin: 20px; min-height: 200px; }
        
        /* Карточка новости */
        .news-card {
            background: var(--card-bg); border: 1px solid #1a1a1a; padding: 30px;
            position: relative; transition: 0.3s;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .news-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { font-family: 'Minecraft', sans-serif; font-size: 0.65rem; padding: 4px; }
        
        /* Цвета тегов */
        .tag-gold  { background: #FA0; color: #000; }
        .tag-blue  { background: #55F; color: #FFF; }
        .tag-dark-blue  { background: #00A; color: #FFF; }
        .tag-light-purple  { background: #F5F; color: #000; }
        .tag-red  { background: #F55; color: #000; }
        .tag-dark-red  { background: #A00; color: #FFF; }
        .tag-green  { background: #5F5; color: #000; }
        .tag-black-gold  { background: #000; color: #FA0; }

        .news-card h2 { font-family: 'Minecraft'; font-size: 1rem; color: var(--accent); margin-bottom: 15px; line-height: 1.5; }
        .news-meta { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 20px; display: block; font-family: 'Minecraft'; }
        .news-card p, li { color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; }
        .news-card b { color: var(--text-main); }
        .news-card a { color: var(--text-main); transition: 0.3s; }
        .news-card a:hover { color: var(--accent); transition: 0.3s; }
        .news-card ul { color: var(--text-dim); line-height: 1.5; margin: 8px 0; }
        .news-card ol { color: var(--text-dim); line-height: 1.5; margin: 8px 0; }

        /* Состояние "Ничего не найдено" */
        .no-results {
            text-align: center; color: var(--text-dim); font-family: 'Minecraft';
            font-size: 0.8rem; margin: 60px 0; grid-column: 1/-1;
        }

        .show-more-btn {
            background: transparent; border: 1px dashed var(--text-dim); color: var(--text-dim);
            padding: 15px; width: 100%; font-family: 'Minecraft'; font-size: 0.7rem;
            cursor: url('pointer.png'), pointer; transition: 0.3s;
        }
        .show-more-btn:hover { border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader-wrapper" style="
    position: fixed;
    user-select: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.5s ease, visibility 0.5s;
    animation: hideLoaderNoJS 0.5s forwards;
    animation-delay: 0.25s;
">
    <div style="position: relative; text-align: center; width: 100%;">
        
        <!-- Основной текст (исчезает через 5 секунд) -->
        <div style="
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            animation: fadeOutText 0.3s forwards;
            animation-delay: 5s;
        ">
            <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> загружается...
        </div>

        <!-- Текст ошибки -->
        <div style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            opacity: 0;
            animation: fadeInText 0.3s forwards;
            animation-delay: 5s;
            line-height: 0.7;
        ">
            «Что-то вы долго!»<span style="font-size: clamp(1.5vh, 1.5vw, 1.5vw);"><br>Попробуйте обновить страницу.<br>Загрузка всё ещё идёт.</span>
        </div>
        
    </div>
</div>

<script>
    // Мгновенная блокировка авто-скрытия, если JS разрешен
    (function() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            // Удаляем анимацию hideLoaderNoJS, чтобы лоадер не исчез сам по себе
            loader.style.animation = 'none';
        }
    })();
</script>

<style>
    /* Блокировка скролла по умолчанию */
    body { 
        overflow: hidden;
    }

    /* Анимация для случая, когда JavaScript отключен */
    @keyframes hideLoaderNoJS {
        to { 
            opacity: 0; 
            visibility: hidden; 
        }
    }

    @keyframes fadeOutText {
        from { opacity: 1; }
        to { opacity: 0; visibility: hidden; }
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

    <div class="content-wrapper">
        <div class="header-section">
            <h1>Лента новостей</h1>
        </div>

<div class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск по новостям...">
    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
        <div class="filter-tags" id="filterContainer"></div>
        <button id="clearFilters" class="filter-btn" style="display: none; border-color: var(--accent); color: var(--accent); background: rgba(255, 170, 0, 0.05);">
            x СБРОСИТЬ
        </button>

        <div class="news-list" id="newsContainer"></div>
        
        <div style="margin: 0 20px 40px 20px;" id="btnWrapper">
            <button class="show-more-btn" id="loadMoreBtn">ПОКАЗАТЬ ПРЕДЫДУЩИЕ НОВОСТИ</button>
        </div>
    </div>
    
    <div id="footer-inject"></div>


<script src="/js/news-data.js"></script> <script>
    // Используем данные из внешнего файла
    const newsData = window.allNews || []; 

    let activeFilters = new Set();
    let filteredNews = [];
    let currentIndex = 0;
    const limit = 3;

    const container = document.getElementById('newsContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearFilters');

    function stripHTML(html) {
        const tmp = document.createElement("DIV");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
    }

    function renderFilterButtons() {
        const tags = new Set();
        // Берем теги из newsData
        newsData.forEach(n => n.tags.forEach(t => tags.add(t.n)));
        const filterBox = document.getElementById('filterContainer');
        filterBox.innerHTML = ''; 
        
        tags.forEach(tagName => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = tagName;
            btn.onclick = () => toggleFilter(tagName, btn);
            filterBox.appendChild(btn);
        });
    }

    function toggleFilter(tagName, btn) {
        if (activeFilters.has(tagName)) {
            activeFilters.delete(tagName);
            btn.classList.remove('active');
        } else {
            activeFilters.add(tagName);
            btn.classList.add('active');
        }
        applyFilters();
    }

    clearBtn.onclick = function() {
        activeFilters.clear();
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        searchInput.value = '';
        applyFilters();
    };

    function applyFilters() {
        const query = searchInput.value.toLowerCase();
        clearBtn.style.display = (activeFilters.size > 0 || query.length > 0) ? 'block' : 'none';

        // Фильтруем newsData
        filteredNews = newsData.filter(news => {
            const cleanTitle = stripHTML(news.title).toLowerCase();
            const cleanContent = stripHTML(news.content).toLowerCase();
            const matchesSearch = cleanTitle.includes(query) || cleanContent.includes(query);
            const matchesTags = activeFilters.size === 0 || news.tags.some(t => activeFilters.has(t.n));
            return matchesSearch && matchesTags;
        });

        currentIndex = 0;
        container.innerHTML = '';
        
        if (filteredNews.length === 0) {
            container.innerHTML = `<div class="no-results">ПО ВАШЕМУ ЗАПРОСУ НИЧЕГО НЕ НАЙДЕНО.</div>`;
            document.getElementById('btnWrapper').style.display = 'none';
        } else {
            document.getElementById('btnWrapper').style.display = 'block';
            renderBatch();
        }
    }

    function renderBatch() {
        const nextBatch = filteredNews.slice(currentIndex, currentIndex + limit);
        nextBatch.forEach(item => {
            const tagsHtml = item.tags.map(t => `<span class="tag ${t.c}">${t.n}</span>`).join('');
            
            // ИЗМЕНЕНО: Заголовок теперь ссылка на /news/id
            // Убрали id="${item.id}" из контейнера, так как теперь есть прямая ссылка
            const html = `
                <a href="/news/${item.id}" class="news-card" style="text-decoration: none; color: inherit;">
                    <span class="news-meta">${item.date}</span>
                    <h2>${item.title}</h2>
                    <div class="news-tags">${tagsHtml}</div>
                    <p>${item.content}</p>
                </a>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
        
        currentIndex += limit;
        loadMoreBtn.style.display = currentIndex >= filteredNews.length ? 'none' : 'block';
    }

    searchInput.addEventListener('input', applyFilters);
    loadMoreBtn.addEventListener('click', renderBatch);

    // Старт
    renderFilterButtons();
    applyFilters();
</script>
