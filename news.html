<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaeront | Новости</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #FFAA00;
            --text-main: #ffffff;
            --text-dim: #888888;
            --line-color: rgba(40, 40, 40, 0.4);
            --nav-height: 50px;
            --card-bg: rgba(20, 20, 20, 0.6);
        }
        @font-face {
            font-family: 'Minecraft';
            src: url('minecraft.ttf') format('truetype');
            font-weight: 200; font-style: normal; font-display: swap;
        }
        body {
            background-color: var(--bg);
            background-image: linear-gradient(135deg, var(--line-color) 25%, transparent 50%, transparent 50%, var(--line-color) 50%, var(--line-color) 75%, transparent 75%, transparent);
            background-size: 12px 12px; color: var(--text-main); font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Навигация */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(5px);
            border-bottom: 1.5px solid #1a1a1a; display: flex; justify-content: space-between;
            align-items: center; padding: 0 5%; box-sizing: border-box; z-index: 2000;
        }
        .nav-logo { font-family: 'Minecraft'; font-size: 0.75rem; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; gap: 10px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.6rem; text-transform: uppercase; transition: 0.3s; font-weight: 600; }
        .nav-links a:hover { color: var(--accent); }

        .content-wrapper {
            padding-top: calc(var(--nav-height) + 40px);
            max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; flex-grow: 1;
        }

        /* Панель управления (Поиск и Фильтры) */
        .controls { margin: 20px; display: flex; flex-direction: column; gap: 15px; }
        .search-input {
            background: #151515; border: 1px solid #333; color: white;
            padding: 12px; font-family: 'Montserrat'; outline: none; width: 100%; box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--accent); }
        
        .filter-tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-btn {
            background: #151515; border: 1px solid #333; color: var(--text-dim);
            padding: 5px 12px; cursor: pointer; font-family: 'Minecraft'; font-size: 0.6rem; transition: 0.3s;
        }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255, 170, 0, 0.1); }

        .header-section { margin: 20px; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: var(--text-main); text-decoration: none; font-family: 'Minecraft'; font-size: 0.7rem; transition: 0.3s; }
        h1 { font-family: 'Minecraft'; font-size: 1.5rem; color: var(--accent); margin-bottom: 30px; }

        .news-list { display: flex; flex-direction: column; gap: 30px; margin: 20px; }
        
        .news-card {
            background: var(--card-bg); border: 1px solid #1a1a1a; padding: 30px;
            position: relative; transition: 0.3s;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .news-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag { font-family: 'Minecraft', sans-serif; font-size: 0.65rem; padding: 3px 5px; }
        
        /* Классы тегов */
        .tag-default { background: #444; color: #fff; }
        .tag-gold { background: #FA0; color: #000; }
        .tag-blue { background: #55F; color: #fff; }
        .tag-red { background: #F55; color: #000; }
        .tag-dark-red { background: #A00; color: #fff; }

        .news-card h2 { font-family: 'Minecraft'; font-size: 1rem; color: var(--accent); margin: 0 0 15px 0; }
        .news-meta { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 20px; display: block; font-family: 'Minecraft'; }
        .news-card p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; margin-bottom: 0; }

        .show-more-btn {
            background: transparent; border: 1px dashed var(--text-dim); color: var(--text-dim);
            padding: 15px; width: 100%; font-family: 'Minecraft'; font-size: 0.7rem;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .show-more-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .show-more-btn:disabled { opacity: 0.3; cursor: default; }

        footer { padding: 60px 20px; background: #050505; border-top: 1px solid #111; margin-top: auto; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; }
        .footer-section h4 { font-family: 'Minecraft'; font-size: 0.7rem; color: var(--accent); margin-bottom: 20px; }
        .footer-links { list-style: none; padding: 0; margin: 0; }
        .footer-links li { margin-bottom: 10px; }
        .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 0.8rem; transition: 0.3s; }
        .footer-links a:hover { color: var(--accent); }
        .copyright-bar { border-top: 1px solid #111; padding-top: 30px; margin-top: 40px; text-align: center; font-size: 0.65rem; color: #333; font-family: 'Minecraft'; }
    </style>
</head>
<body>

    <nav>
        <a href="./" class="nav-logo">Kaeront</a>
        <div class="nav-links">
            <a href="./#servers">Сервера</a>
            <a href="news">Новости</a>
            <a href="https://t.me/KaerontMC" target="_blank">Поддержка</a>
            <a href="donate" style="color: var(--accent);">Пожертвовать</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <div class="header-section">
            <a href="./" class="btn-back">< НА ГЛАВНУЮ</a>
            <h1>Лента новостей</h1>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск новостей...">
            <div class="filter-tags" id="filterContainer">
                <button class="filter-btn active" onclick="filterByTag('Все')">Все</button>
                </div>
        </div>

        <div class="news-list" id="newsContainer">
            </div>
        
        <div style="margin: 0 20px 40px 20px;">
            <button class="show-more-btn" id="loadMoreBtn">ПОКАЗАТЬ ПРЕДЫДУЩИЕ НОВОСТИ</button>
        </div>
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-section">
                <h4>KAERONT</h4>
                <p style="font-size: 0.8rem; color: #888;">«Мы создаем качественное игровое пространство для тех, кто ценит Minecraft как искусство» — KAmir.</p>
            </div>
            <div class="footer-section">
                <h4>ПРОЕКТ</h4>
                <ul class="footer-links">
                    <li><a href="news">Новости</a></li>
                    <li><a href="donate">Пожертвовать</a></li>
                </ul>
            </div>
        </div>
        <div class="copyright-bar">Copyright © Kaeront 2026.</div>
    </footer>

    <script>
        // БАЗА ДАННЫХ НОВОСТЕЙ
        const allNews = [
            {
                id: "11-03-2026",
                date: "11 марта, 2026 года",
                title: "Мы переезжаем!",
                tags: [{name: "Сайт", class: "tag-blue"}, {name: "Сервера", class: "tag-blue"}],
                content: "Проект Kaeront переехал на новый домен! Теперь, kaeront.ru будет единой точкой всего проекта."
            },
            {
                id: "09-03-2026",
                date: "9 марта, 2026 года",
                title: "Технические работы",
                tags: [{name: "Отключение", class: "tag-dark-red"}, {name: "Важное", class: "tag-red"}, {name: "Сервера", class: "tag-blue"}],
                content: "Проект Kaeront временно меняет формат! Мы приостанавливаем работу режима Survival, чтобы сосредоточиться на технической части."
            },
            {
                id: "08-03-2026",
                date: "8 марта, 2026 года",
                title: "Открытие официального сайта",
                tags: [{name: "Важное", class: "tag-red"}, {name: "Сайт", class: "tag-blue"}],
                content: "Добро пожаловать в наш новый цифровой дом! Теперь следить за прогрессом можно в одном месте."
            },
            {
                id: "04-03-2026",
                date: "4 марта, 2026 года",
                title: "Мы переименовались в Kaeront",
                tags: [{name: "Важное", class: "tag-red"}],
                content: "Мы официально меняем название на Kaeront. Это решение связано с расширением нашей инфраструктуры."
            },
            {
                id: "23-02-2026",
                date: "23 февраля, 2026 года",
                title: "Чувствуете запах выпечки?",
                tags: [{name: "AlsasnikS", class: "tag-blue"}],
                content: "Мы делаем классный датапак 'Cuisine', который добавит нам новые предметы, связанные с кулинарией!"
            },
            {
                id: "22-02-2026",
                date: "22 февраля, 2026 года",
                title: "Ачивочное выживание",
                tags: [{name: "AlsasnikS", class: "tag-blue"}],
                content: "Скоро на AlsasnikS появятся новые ачивки и квесты! У нас уже готово 30 ачивок."
            }
        ];

        let filteredNews = [...allNews];
        let currentIndex = 0;
        const limit = 3; // Сколько новостей грузить за раз
        let currentTag = "Все";

        const newsContainer = document.getElementById('newsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const searchInput = document.getElementById('searchInput');

        // Инициализация фильтров тегов
        function initFilters() {
            const tags = new Set();
            allNews.forEach(news => news.tags.forEach(t => tags.add(t.name)));
            const container = document.getElementById('filterContainer');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = tag;
                btn.onclick = () => filterByTag(tag);
                container.appendChild(btn);
            });
        }

        // Отрисовка одной карточки
        function createCard(item) {
            const tagsHtml = item.tags.map(t => `<span class="tag ${t.class}">${t.name}</span>`).join('');
            return `
                <div class="news-card" id="${item.id}">
                    <span class="news-meta">${item.date}</span>
                    <h2>${item.title}</h2>
                    <div class="news-tags">${tagsHtml}</div>
                    <p>${item.content}</p>
                </div>
            `;
        }

        // Рендер порции новостей
        function renderNext() {
            const nextBatch = filteredNews.slice(currentIndex, currentIndex + limit);
            nextBatch.forEach(item => {
                newsContainer.insertAdjacentHTML('beforeend', createCard(item));
            });
            currentIndex += limit;
            
            if (currentIndex >= filteredNews.length) {
                loadMoreBtn.style.display = 'none';
            } else {
                loadMoreBtn.style.display = 'block';
            }
        }

        // Сброс и применение фильтров/поиска
        function updateDisplay() {
            newsContainer.innerHTML = '';
            currentIndex = 0;
            const query = searchInput.value.toLowerCase();

            filteredNews = allNews.filter(news => {
                const matchesSearch = news.title.toLowerCase().includes(query) || news.content.toLowerCase().includes(query);
                const matchesTag = currentTag === "Все" || news.tags.some(t => t.name === currentTag);
                return matchesSearch && matchesTag;
            });

            renderNext();
        }

        function filterByTag(tag) {
            currentTag = tag;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === tag);
            });
            updateDisplay();
        }

        // Слушатели событий
        loadMoreBtn.addEventListener('click', renderNext);
        searchInput.addEventListener('input', updateDisplay);

        // Старт
        initFilters();
        updateDisplay();
    </script>
</body>
</html>
