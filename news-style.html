<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/assets/newspaper.png">
    <title>Kaeront | Новость</title>
    <script src="/assets/news-data.js"></script>
    <script src="/assets/global.js" defer></script>
<script>
    (function() {
        window.addEventListener('DOMContentLoaded', () => {
            const pathParts = window.location.pathname.split('/');
            // Берем ID новости, игнорируя расширение .html если оно есть
            const newsId = pathParts[pathParts.length - 1].replace('.html', '');

            if (!window.allNews) {
                console.error("База новостей не найдена!");
                return;
            }

            const item = window.allNews.find(n => n.id === newsId);

            const titleEl = document.getElementById('news-title');
            const dateEl = document.getElementById('news-date');
            const textEl = document.getElementById('news-text');

            if (item) {
                document.title = item.title + " | Новость Kaeront";
                if(titleEl) titleEl.textContent = item.title;
                if(dateEl) dateEl.textContent = item.date;
                
                // Рендерим теги
                const tagsHtml = item.tags ? 
                    `<div class="news-tags">` + 
                    item.tags.map(t => `<span class="tag ${t.c}">${t.n}</span>`).join('') + 
                    `</div>` : '';

                if(textEl) {
                    textEl.innerHTML = tagsHtml + item.content + 
                    `<br><br><a href="/news" style="color: var(--accent); text-decoration: none; font-family: 'Minecraft'; font-size: 0.7rem;">← НАЗАД К НОВОСТЯМ</a>`;
                }
            } else {
                if(titleEl) titleEl.textContent = "Новость не найдена";
                if(textEl) textEl.innerHTML = "<a href='/news'>Вернуться к списку</a>";
            }
        });
    })();
</script>

    
    <style>
        :root {
            --nav-hide: 50px;
        }

        /* --- NEW CONTENT --- */
        .new-wrapper {
            padding-top: calc(var(--nav-height) + 40px);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .new-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #1a1a1a;
            border-top: 4px solid var(--accent);
            padding: 50px 40px;
            margin: 20px;
        }

        .news-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { font-family: 'Minecraft', sans-serif; font-size: 0.65rem; padding: 4px; }

        /* Цвета тегов */
        .tag-gold  { background: #FA0; color: #000; }
        .tag-blue  { background: #55F; color: #FFF; }
        .tag-dark-blue  { background: #00A; color: #FFF; }
        .tag-light-purple  { background: #F5F; color: #000; }
        .tag-red  { background: #F55; color: #000; }
        .tag-dark-red  { background: #A00; color: #FFF; }
        .tag-green  { background: #5F5; color: #000; }
        .tag-black-gold  { background: #000; color: #FA0; }

        h1 { font-family: 'Minecraft'; font-size: 1rem; color: var(--accent); margin-bottom: 15px; line-height: 1.5; }
        .date-label { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 20px; display: block; font-family: 'Minecraft'; }

        h3 { font-family: 'Minecraft'; font-size: 0.8rem; color: #fff; margin-top: 40px; border-left: 3px solid var(--accent); padding-left: 15px; }
        p, li { color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; }
        b { color: var(--text-main); }
        a { color: var(--text-main); transition: 0.3s; }
        a:hover { color: var(--accent); transition: 0.3s; }
        ul { color: var(--text-dim); line-height: 1.5; margin: 8px 0; }
        ol { color: var(--text-dim); line-height: 1.5; margin: 8px 0; }

        @media (max-width: 600px) {
            .new-card { padding: 30px 20px; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader-wrapper" style="
    position: fixed;
    user-select: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    transition: opacity 0.5s ease, visibility 0.5s;
    animation: hideLoaderNoJS 0.5s forwards;
    animation-delay: 0.25s;
">
    <div style="position: relative; text-align: center; width: 100%;">

        <!-- Основной текст (исчезает через 5 секунд) -->
        <div style="
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            animation: fadeOutText 0.3s forwards;
            animation-delay: 5s;
        ">
            <span style="font-family: sans-serif; color: #FFAA00;">Kaeront</span> загружается...
        </div>

        <!-- Текст ошибки -->
        <div style="
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            font-family: sans-serif;
            color: #888;
            font-size: clamp(3vh, 3vw, 3vw);
            opacity: 0;
            animation: fadeInText 0.3s forwards;
            animation-delay: 5s;
            line-height: 0.7;
        ">
            «Что-то вы долго!»<span style="font-size: clamp(1.5vh, 1.5vw, 1.5vw);"><br>Попробуйте обновить страницу.<br>Загрузка всё ещё идёт.</span>
        </div>

    </div>
</div>

<script>
    // Мгновенная блокировка авто-скрытия, если JS разрешен
    (function() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) {
            // Удаляем анимацию hideLoaderNoJS, чтобы лоадер не исчез сам по себе
            loader.style.animation = 'none';
        }
    })();
</script>

<style>
    /* Блокировка скролла по умолчанию */
    body { 
        overflow: hidden;
    }

    /* Анимация для случая, когда JavaScript отключен */
    @keyframes hideLoaderNoJS {
        to { 
            opacity: 0; 
            visibility: hidden; 
        }
    }

    @keyframes fadeOutText {
        from { opacity: 1; }
        to { opacity: 0; visibility: hidden; }
    }

    @keyframes fadeInText {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

            top: 0; left: 0;

            display: flex; 
            flex-direction: column; 
            align-items: center;

            <p style="max-width: 80vw; font-size: clamp(1.5vh, 1.2vw, 1.2vw); line-height: 1.6; color: #888; ">

        <style>

    <div id="dev-inject"></div>
    <div id="nav-inject"></div>

    <div class="new-wrapper">
        <div class="new-card">

<h1 id="news-title">Загрузка...</h1>
        <span class="date-label" id="news-date"></span>
        <div id="news-text"></div>
        </div>
    </div>

    <div id="footer-inject"></div>

</body>
</html>
