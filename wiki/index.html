<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="База знаний и лор игровых серверов экосистемы Kaeront. Подробные гайды, механики и правила проекта.">
    <meta property="og:title" content="Kaeront Wiki — База знаний">
    <meta property="og:description" content="Официальная база знаний сети серверов Kaeront. Лор, механики, улучшения.">
    <meta property="og:image" content="/assets/palm.png">
    <link rel="icon" type="image/png" href="/assets/palm.png">
    
    <title>Kaeront Wiki</title>

    <script src="/assets/global.js" defer></script>
    <script src="/wiki-global.js" defer></script>
</head>
<body>
    <div id="wiki-nav-inject"></div>

    <main class="wiki-wrapper">
        <div class="wiki-layout">
            
            <aside class="wiki-sidebar" id="wikiSidebar">
                <div class="sidebar-header">Навигация по Wiki</div>
                <nav class="tree-nav" id="wikiTreeNav">
                    </nav>
            </aside>

            <section class="wiki-main-viewport">
                <div class="viewport-overlay" id="viewportOverlay"></div>
                
                <article class="markdown-body" id="wikiContent">
                    </article>
            </section>

        </div>
    </main>

    <div id="footer-inject"></div>
    <div id="dev-inject"></div>
</body>
</html>
